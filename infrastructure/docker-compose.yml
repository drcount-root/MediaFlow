name: mediaflow

services:
  postgres:
    image: postgres:16-alpine
    container_name: mediaflow-postgres
    environment:
      POSTGRES_DB: mediaflow
      POSTGRES_USER: mediaflow
      POSTGRES_PASSWORD: mediaflow
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediaflow -d mediaflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: mediaflow-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: mediaflow
      RABBITMQ_DEFAULT_PASS: mediaflow
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mediaflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: mediaflow-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: mediaflow
      MINIO_ROOT_PASSWORD: mediaflow-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-setup:
    image: minio/mc:latest
    container_name: mediaflow-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 mediaflow mediaflow-secret &&
      mc mb --ignore-existing local/mediaflow-raw &&
      mc mb --ignore-existing local/mediaflow-processed &&
      mc mb --ignore-existing local/mediaflow-thumbnails &&
      mc anonymous set download local/mediaflow-processed &&
      mc anonymous set download local/mediaflow-thumbnails
      "

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
  minio_data:
